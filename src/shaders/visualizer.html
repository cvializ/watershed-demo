<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f346e;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            padding: 8px 12px;
            font-size: 0.95rem;
            border: none;
            border-radius: 6px;
            background: #0f346e;
            color: white;
            cursor: pointer;
        }

        select:focus {
            outline: 2px solid #e94560;
            outline-offset: 2px;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shader-info {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .shader-info span {
            margin-right: 15px;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        canvas {
            width: 512px;
            height: 512px;
            max-width: 512px;
            max-height: 512px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        #controls-panel {
            background: #16213e;
            padding: 20px;
            border-top: 1px solid #0f346e;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            width: 200px;
            margin-right: 10px;
        }

        .control-group span {
            font-size: 0.85rem;
            color: #e94560;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e94560;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loader">
        <div class="spinner"></div>
    </div>

    <header>
        <h1>Shader Visualizer</h1>
        <div class="controls">
            <select id="shader-select">
                <option value="">Loading shaders...</option>
            </select>
            <select id="geometry-select" disabled>
                <option value="">Select shader first</option>
            </select>
            <div class="shader-info" id="shader-info">
                <span id="vertex-shader">Vertex: -</span>
                <span id="fragment-shader">Fragment: -</span>
            </div>
        </div>
    </header>

    <main id="canvas-container">
        <!-- Canvas will be injected here -->
    </main>

    <div id="controls-panel" style="display: none;">
        <!-- Dynamic controls will be injected here -->
    </div>
    <script type="module" src="./visualizer.ts"></script>
</body>
</html>
